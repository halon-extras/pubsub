services:
  ubuntu-26.04-arm64:
    profiles: ["arm64", "all"]
    platform: linux/arm64
    build:
      context: ./ubuntu-26.04
      dockerfile: ./Dockerfile
      args:
        HALON_REPO_USER: ${HALON_REPO_USER}
        HALON_REPO_PASS: ${HALON_REPO_PASS}
      platforms:
        - linux/arm64
    volumes:
      - ../:/plugin
